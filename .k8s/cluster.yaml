apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: aviation-safety-capstone-prod
  region: us-east-1
  version: "1.34"

# Saves ~$0.10/hr vs default — uses IPv4 and skips unnecessary add-ons
availabilityZones: ["us-east-1a", "us-east-1b"]

managedNodeGroups:
  # General purpose node — runs frontend, FastAPI driver, BM25
  - name: general
    instanceType: t3a.medium
    minSize: 1
    maxSize: 3
    desiredCapacity: 1
    spot: false
    labels:
      role: general
    tags:
      Project: aviation-safety

  # Memory-optimized node — runs embedding pod and Qdrant
  # r6a.large: 2 vCPU, 16GB RAM — fits both gte-large (~3Gi) + Qdrant (~4Gi)
  - name: memory-optimized
    instanceType: r6a.large
    minSize: 1
    maxSize: 2
    desiredCapacity: 1
    spot: false
    labels:
      role: memory-optimized
    tags:
      Project: aviation-safety

addons:
  - name: coredns
    version: v1.13.2-eksbuild.4
  - name: kube-proxy
    version: v1.34.6-eksbuild.2
  - name: vpc-cni
    version: v1.21.1-eksbuild.7