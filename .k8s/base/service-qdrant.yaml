apiVersion: v1
kind: Service
metadata:
  name: qdrant-service
spec:
  selector:
    app: qdrant
  ports:
    - name: http
      protocol: TCP
      port: 6333
      targetPort: 6333
    - name: grpc
      protocol: TCP
      port: 6334
      targetPort: 6334
  # ClusterIP means Qdrant is only reachable within the cluster.
  # Your FastAPI services connect via http://qdrant-service:6333
  # The local overlay replaces this with an ExternalName service
  # pointing to the Docker container running on the host machine.
  type: ClusterIP