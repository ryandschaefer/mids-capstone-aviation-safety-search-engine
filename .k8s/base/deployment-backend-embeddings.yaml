---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-embeddings-deployment
  namespace: aviation-safety
  labels:
    app: backend-embeddings-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-embeddings
  template:
    metadata:
      labels:
        app: backend-embeddings
    spec:
      # Pin to the memory-optimized node group (r6i.large, 16GB RAM).
      # Keeps Qdrant and the embedding pod on the high-memory node away
      # from the general-purpose t3.medium nodes.
      nodeSelector:
        role: memory-optimized
 
      # Container with script to populate qdrant database on init
      initContainers:
        - name: qdrant-init
          image: qdrant-init:latest
          env:
            - name: QDRANT_HOST
              value: qdrant-service
            - name: QDRANT_PORT
              value: "6333"
            - name: QDRANT_GRPC_PORT
              value: "6334"
            - name: QDRANT_COLLECTION
              value: aviation-safety
            - name: S3_BUCKET
              value: asrs-storage-anabel-2026
            - name: S3_KEY
              value: embeddings/gte_large_embeddings.parquet
            - name: BATCH_SIZE
              value: "2000"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_ACCESS_KEY_S3
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_SECRET_KEY_S3
            - name: AWS_DEFAULT_REGION
              value: us-east-1
          resources:
            requests:
              cpu: "500m"
              memory: "3Gi"
            limits:
              cpu: "1000m"
              memory: "5Gi"

      containers:
        - name: backend-embeddings-container
          image: backend-embeddings:latest
          imagePullPolicy: Never
          env:
            - name: MAIN_DRIVER_URL
              value: http://backend-main-service:8000
            - name: QUERY_EMBEDDING_MODEL
              value: sentence-transformers/all-MiniLM-L12-v2
            - name: QDRANT_HOST
              value: host.minikube.internal
            - name: QDRANT_PORT
              value: "6333"
            - name: QDRANT_COLLECTION
              value: aviation-safety
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 4Gi
          ports:
            - containerPort: 8002
          readinessProbe:
            httpGet:
              scheme: HTTP
              path: /health
              port: 8002
            initialDelaySeconds: 1
            periodSeconds: 60
          livenessProbe:
            httpGet:
              scheme: HTTP
              path: /health
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 120
          startupProbe:
            httpGet:
              scheme: HTTP
              path: /health
              port: 8002
            failureThreshold: 30
            periodSeconds: 10
